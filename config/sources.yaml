sources:
  - name: dongqiudi
    display_name: "懂球帝"
    base_url: "https://www.dongqiudi.com/"
    enabled: true
    crawler_module: "football_news_hub.crawler.dongqiudi"
    crawler_class: "DongqiudiCrawler"
    max_pages: 1
    incremental_max_pages: 10
    stop_on_seen_articles: true
    request_delay: 2.0
    selectors:
      article_list: ".detail, .news-item, [class*='article'], [class*='feed-item']"
      title: "h2, h3, h4, [class*='title']"
      url: "a"
      image: "img"
      category: "[class*='tag'], [class*='category'], [class*='label']"
      comment_count: "[class*='comment']"
      published_at: "[class*='time'], [class*='meta']"
      next_page: "[class*='next'], [class*='more']"

  - name: arsenal
    display_name: "Arsenal Official"
    base_url: "https://www.arsenal.com/results"
    enabled: true
    crawler_module: "football_news_hub.crawler.arsenal"
    crawler_class: "ArsenalCrawler"
    max_pages: 1
    incremental_max_pages: 5
    stop_on_seen_articles: true
    request_delay: 3.0
    selectors:
      article_list: ".results-list__item, .result-item"
      title: "h3, h4, .result-title"
      url: "a"
      image: "img"
      category: "[class*='competition']"
      comment_count: null
      published_at: "[class*='date']"
      next_page: null

storage_path: "data/articles.db"
log_level: "INFO"

llm:
  provider: minimax
  api_key: "sk-cp-Qg1BNBk1_eq6UREqDZXcWZVwvqGnALT0hBAPuEGbwh2XOSfZW6t0KcO9VXou9pXv4yio9-GB-k8fvPwxyaKHIvaasJZKtpke2-hBdIkh-Uwyo8tel4jRtFA"

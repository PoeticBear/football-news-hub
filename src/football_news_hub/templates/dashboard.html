<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football News Hub</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #242836;
    --border: #2a2e3a;
    --text: #e4e6eb;
    --text-secondary: #8b8fa3;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --tag-bg: #1e293b;
    --tag-text: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
    white-space: nowrap;
  }
  .logo-icon { font-size: 28px; }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    gap: 6px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    outline: none;
    width: 180px;
  }
  .search-box input::placeholder { color: var(--text-secondary); }
  .search-icon { color: var(--text-secondary); font-size: 16px; }
  select, button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  select:hover, button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent-hover); }
  .stats-bar {
    max-width: 1200px;
    margin: 16px auto;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    min-width: 140px;
    flex: 1;
  }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.blue { color: var(--accent); }
  .stat-value.orange { color: var(--orange); }
  .category-bar {
    max-width: 1200px;
    margin: 0 auto 8px;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .category-bar span { font-size: 13px; color: var(--text-secondary); }
  .cat-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .cat-tag:hover, .cat-tag.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .articles {
    max-width: 1200px;
    margin: 0 auto;
    padding: 8px 24px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .article-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card-image {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: var(--bg);
  }
  .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .card-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .card-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }
  .card-source {
    background: rgba(59,130,246,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .card-info { display: flex; gap: 10px; align-items: center; }
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
  }
  .spinner {
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 768px) {
    .articles { grid-template-columns: 1fr; }
    .search-box input { width: 120px; }
    .header-inner { gap: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">⚽</span>
      <span>Football News Hub</span>
    </div>
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索新闻标题..." />
      </div>
      <select id="sourceFilter">
        <option value="">全部来源</option>
        <option value="dongqiudi">懂球帝</option>
      </select>
      <button class="primary" onclick="crawlAndRefresh()">🔄 爬取最新</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-card">
    <div class="stat-label">总文章数</div>
    <div class="stat-value green" id="statTotal">-</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">数据源</div>
    <div class="stat-value blue" id="statSources">-</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">分类数</div>
    <div class="stat-value orange" id="statCategories">-</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">最近爬取</div>
    <div class="stat-value" id="statLastCrawl" style="font-size:14px;">-</div>
  </div>
</div>

<div class="category-bar" id="categoryBar">
  <span>分类筛选：</span>
</div>

<div class="articles" id="articlesGrid">
  <div class="loading">
    <div class="spinner"></div>
    加载中...
  </div>
</div>

<script>
let currentCategory = '';
let currentSource = '';
let currentKeyword = '';

async function fetchJSON(url) {
  const res = await fetch(url);
  return res.json();
}

async function loadStats() {
  const stats = await fetchJSON('/api/stats');
  document.getElementById('statTotal').textContent = stats.total_articles || 0;
  document.getElementById('statSources').textContent = Object.keys(stats.by_source || {}).length;
  document.getElementById('statCategories').textContent = (stats.categories || []).length;

  const lastCrawl = stats.last_crawl || {};
  const times = Object.values(lastCrawl);
  if (times.length > 0) {
    const latest = times.sort().reverse()[0];
    document.getElementById('statLastCrawl').textContent = latest.replace('T', ' ').substring(5, 16);
  }

  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '<span>分类筛选：</span>';
  const allTag = document.createElement('span');
  allTag.className = 'cat-tag' + (currentCategory === '' ? ' active' : '');
  allTag.textContent = '全部';
  allTag.onclick = () => { currentCategory = ''; loadArticles(); loadCategories(); };
  bar.appendChild(allTag);

  (stats.categories || []).forEach(cat => {
    const tag = document.createElement('span');
    tag.className = 'cat-tag' + (currentCategory === cat.category ? ' active' : '');
    tag.textContent = `${cat.category} (${cat.count})`;
    tag.onclick = () => { currentCategory = cat.category; loadArticles(); loadCategories(); };
    bar.appendChild(tag);
  });
}

async function loadCategories() {
  const cats = await fetchJSON('/api/categories');
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '<span>分类筛选：</span>';

  const allTag = document.createElement('span');
  allTag.className = 'cat-tag' + (currentCategory === '' ? ' active' : '');
  allTag.textContent = '全部';
  allTag.onclick = () => { currentCategory = ''; loadArticles(); loadCategories(); };
  bar.appendChild(allTag);

  cats.forEach(cat => {
    const tag = document.createElement('span');
    tag.className = 'cat-tag' + (currentCategory === cat.category ? ' active' : '');
    tag.textContent = `${cat.category} (${cat.count})`;
    tag.onclick = () => { currentCategory = cat.category; loadArticles(); loadCategories(); };
    bar.appendChild(tag);
  });
}

async function loadArticles() {
  const grid = document.getElementById('articlesGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

  const params = new URLSearchParams();
  if (currentSource) params.set('source', currentSource);
  if (currentCategory) params.set('category', currentCategory);
  if (currentKeyword) params.set('keyword', currentKeyword);
  params.set('limit', '50');

  const articles = await fetchJSON('/api/articles?' + params.toString());

  if (!articles || articles.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无文章数据</div><div style="margin-top:8px;font-size:13px;">点击右上角「爬取最新」获取数据</div></div>';
    return;
  }

  grid.innerHTML = '';
  articles.forEach(article => {
    const card = document.createElement('div');
    card.className = 'article-card';
    card.onclick = () => { if (article.url) window.open(article.url, '_blank'); };

    const sourceMap = { dongqiudi: '懂球帝' };
    const sourceLabel = sourceMap[article.source] || article.source;
    const timeStr = article.published_at ? article.published_at.replace('T', ' ').substring(5, 16) : '';

    card.innerHTML = `
      ${article.image_url ? `<img class="card-image" src="${article.image_url}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
      <div class="card-body">
        <div class="card-title">${escapeHtml(article.title)}</div>
        <div class="card-meta">
          <div class="card-tags">
            <span class="card-source">${sourceLabel}</span>
            ${article.category ? article.category.split(' ').map(c => `<span class="card-tag">${escapeHtml(c)}</span>`).join('') : ''}
          </div>
          <div class="card-info">
            ${article.comment_count != null ? `<span>💬 ${article.comment_count}</span>` : ''}
            ${timeStr ? `<span>${timeStr}</span>` : ''}
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

let crawlBusy = false;
async function crawlAndRefresh() {
  if (crawlBusy) return;
  crawlBusy = true;
  const btn = document.querySelector('button.primary');
  btn.textContent = '⏳ 爬取中...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/crawl', { method: 'POST' });
    const result = await res.json();
    await loadStats();
    await loadArticles();
    const msg = result.error
      ? `爬取完成，但出现错误: ${result.error}`
      : `爬取完成！发现 ${result.total_articles} 篇，新增 ${result.new_articles} 篇`;
    alert(msg);
  } catch (e) {
    alert('爬取请求失败: ' + e.message);
  } finally {
    crawlBusy = false;
    btn.textContent = '🔄 爬取最新';
    btn.disabled = false;
  }
}

document.getElementById('sourceFilter').addEventListener('change', (e) => {
  currentSource = e.target.value;
  loadArticles();
});

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    currentKeyword = e.target.value.trim();
    loadArticles();
  }, 400);
});

loadStats();
loadArticles();
</script>
</body>
</html>

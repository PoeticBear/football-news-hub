<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football News Hub</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #242836;
    --border: #2a2e3a;
    --text: #e4e6eb;
    --text-secondary: #8b8fa3;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --tag-bg: #1e293b;
    --tag-text: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 700;
    white-space: nowrap;
  }
  .logo-icon { font-size: 28px; }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    gap: 6px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    outline: none;
    width: 180px;
  }
  .search-box input::placeholder { color: var(--text-secondary); }
  .search-icon { color: var(--text-secondary); font-size: 16px; }
  select, button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  select:hover, button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent-hover); }
  .stats-bar {
    max-width: 1200px;
    margin: 16px auto;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    min-width: 140px;
    flex: 1;
  }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.blue { color: var(--accent); }
  .stat-value.orange { color: var(--orange); }
  .category-bar {
    max-width: 1200px;
    margin: 0 auto 8px;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .category-bar span { font-size: 13px; color: var(--text-secondary); }
  .cat-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .cat-tag:hover, .cat-tag.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .articles {
    max-width: 1200px;
    margin: 0 auto;
    padding: 8px 24px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .article-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card-image {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: var(--bg);
  }
  .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .card-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .card-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }
  .card-source {
    background: rgba(59,130,246,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .card-info { display: flex; gap: 10px; align-items: center; }
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
  }
  .spinner {
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  button.ai-btn {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border-color: #8b5cf6;
    color: #fff;
    font-weight: 600;
  }
  button.ai-btn:hover { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
  button.tts-btn {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    border-color: #f59e0b;
    color: #fff;
    font-weight: 600;
  }
  button.tts-btn:hover { background: linear-gradient(135deg, #d97706, #dc2626); }
  button.tts-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  button.test-btn {
    background: linear-gradient(135deg, #06b6d4, #0891b2);
    border-color: #06b6d4;
    color: #fff;
    font-weight: 600;
  }
  button.test-btn:hover { background: linear-gradient(135deg, #0891b2, #0e7490); }
  button.test-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 90%;
    max-width: 800px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 18px; }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 24px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .modal-close:hover { color: var(--text); border: none; }
  .modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-body pre {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .modal-footer .info { font-size: 12px; color: var(--text-secondary); }
  @media (max-width: 768px) {
    .articles { grid-template-columns: 1fr; }
    .search-box input { width: 120px; }
    .header-inner { gap: 10px; }
    .modal { width: 95%; max-height: 90vh; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">⚽</span>
      <span>Football News Hub</span>
    </div>
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索新闻标题..." />
      </div>
      <select id="sourceFilter">
        <option value="">全部来源</option>
        <option value="dongqiudi">懂球帝</option>
      </select>
      <button class="primary" onclick="crawlAndRefresh()">🔄 爬取最新</button>
      <button class="ai-btn" onclick="generateScript()">🎙️ AI 播报稿</button>
      <button class="tts-btn" onclick="generateAudio()" id="ttsBtn">🔊 生成音频</button>
      <button class="test-btn" onclick="generateSingle()" id="singleBtn">🧪 单篇测试</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-card">
    <div class="stat-label">总文章数</div>
    <div class="stat-value green" id="statTotal">-</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">数据源</div>
    <div class="stat-value blue" id="statSources">-</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">分类数</div>
    <div class="stat-value orange" id="statCategories">-</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">最近爬取</div>
    <div class="stat-value" id="statLastCrawl" style="font-size:14px;">-</div>
  </div>
</div>

<div class="category-bar" id="categoryBar">
  <span>分类筛选：</span>
</div>

<div class="articles" id="articlesGrid">
  <div class="loading">
    <div class="spinner"></div>
    加载中...
  </div>
</div>

<div class="modal-overlay" id="scriptModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🎙️ AI 新闻播报稿</h2>
      <button class="modal-close" onclick="closeScriptModal()">&times;</button>
    </div>
    <div class="modal-body" id="scriptBody">
      <div class="loading"><div class="spinner"></div>AI 正在生成播报文字稿，请稍候...</div>
    </div>
    <div class="modal-footer">
      <span class="info" id="scriptInfo"></span>
      <button class="primary" id="downloadBtn" onclick="downloadScript()" style="display:none">📥 下载 Markdown</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="audioModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🔊 新闻播报音频</h2>
      <button class="modal-close" onclick="closeAudioModal()">&times;</button>
    </div>
    <div class="modal-body" id="audioBody">
      <div class="loading"><div class="spinner"></div>正在生成播报音频，请稍候...</div>
    </div>
    <div class="modal-footer">
      <span class="info" id="audioInfo"></span>
      <a id="audioDownloadLink" style="display:none" class="primary" download>📥 下载音频</a>
    </div>
  </div>
</div>

<div class="modal-overlay" id="singleModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🧪 单篇新闻测试</h2>
      <button class="modal-close" onclick="closeSingleModal()">&times;</button>
    </div>
    <div class="modal-body" id="singleBody">
      <div class="loading"><div class="spinner"></div>正在处理单篇新闻（生成播报稿 + 音频），请稍候...</div>
    </div>
    <div class="modal-footer">
      <span class="info" id="singleInfo"></span>
      <a id="singleDownloadLink" style="display:none" class="primary" download>📥 下载音频</a>
    </div>
  </div>
</div>

<script>
let currentCategory = '';
let currentSource = '';
let currentKeyword = '';

async function fetchJSON(url) {
  const res = await fetch(url);
  return res.json();
}

async function loadStats() {
  const stats = await fetchJSON('/api/stats');
  document.getElementById('statTotal').textContent = stats.total_articles || 0;
  document.getElementById('statSources').textContent = Object.keys(stats.by_source || {}).length;
  document.getElementById('statCategories').textContent = (stats.categories || []).length;

  const lastCrawl = stats.last_crawl || {};
  const times = Object.values(lastCrawl);
  if (times.length > 0) {
    const latest = times.sort().reverse()[0];
    document.getElementById('statLastCrawl').textContent = latest.replace('T', ' ').substring(5, 16);
  }

  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '<span>分类筛选：</span>';
  const allTag = document.createElement('span');
  allTag.className = 'cat-tag' + (currentCategory === '' ? ' active' : '');
  allTag.textContent = '全部';
  allTag.onclick = () => { currentCategory = ''; loadArticles(); loadCategories(); };
  bar.appendChild(allTag);

  (stats.categories || []).forEach(cat => {
    const tag = document.createElement('span');
    tag.className = 'cat-tag' + (currentCategory === cat.category ? ' active' : '');
    tag.textContent = `${cat.category} (${cat.count})`;
    tag.onclick = () => { currentCategory = cat.category; loadArticles(); loadCategories(); };
    bar.appendChild(tag);
  });
}

async function loadCategories() {
  const cats = await fetchJSON('/api/categories');
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '<span>分类筛选：</span>';

  const allTag = document.createElement('span');
  allTag.className = 'cat-tag' + (currentCategory === '' ? ' active' : '');
  allTag.textContent = '全部';
  allTag.onclick = () => { currentCategory = ''; loadArticles(); loadCategories(); };
  bar.appendChild(allTag);

  cats.forEach(cat => {
    const tag = document.createElement('span');
    tag.className = 'cat-tag' + (currentCategory === cat.category ? ' active' : '');
    tag.textContent = `${cat.category} (${cat.count})`;
    tag.onclick = () => { currentCategory = cat.category; loadArticles(); loadCategories(); };
    bar.appendChild(tag);
  });
}

async function loadArticles() {
  const grid = document.getElementById('articlesGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

  const params = new URLSearchParams();
  if (currentSource) params.set('source', currentSource);
  if (currentCategory) params.set('category', currentCategory);
  if (currentKeyword) params.set('keyword', currentKeyword);
  params.set('limit', '50');

  const articles = await fetchJSON('/api/articles?' + params.toString());

  if (!articles || articles.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无文章数据</div><div style="margin-top:8px;font-size:13px;">点击右上角「爬取最新」获取数据</div></div>';
    return;
  }

  grid.innerHTML = '';
  articles.forEach(article => {
    const card = document.createElement('div');
    card.className = 'article-card';
    card.onclick = () => { if (article.url) window.open(article.url, '_blank'); };

    const sourceMap = { dongqiudi: '懂球帝' };
    const sourceLabel = sourceMap[article.source] || article.source;
    const timeStr = article.published_at ? article.published_at.replace('T', ' ').substring(5, 16) : '';

    card.innerHTML = `
      ${article.image_url ? `<img class="card-image" src="${article.image_url}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
      <div class="card-body">
        <div class="card-title">${escapeHtml(article.title)}</div>
        <div class="card-meta">
          <div class="card-tags">
            <span class="card-source">${sourceLabel}</span>
            ${article.category ? article.category.split(' ').map(c => `<span class="card-tag">${escapeHtml(c)}</span>`).join('') : ''}
          </div>
          <div class="card-info">
            ${article.comment_count != null ? `<span>💬 ${article.comment_count}</span>` : ''}
            ${timeStr ? `<span>${timeStr}</span>` : ''}
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

let crawlBusy = false;
async function crawlAndRefresh() {
  if (crawlBusy) return;
  crawlBusy = true;
  const btn = document.querySelector('button.primary');
  btn.textContent = '⏳ 爬取中...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/crawl', { method: 'POST' });
    const result = await res.json();
    await loadStats();
    await loadArticles();
    const msg = result.error
      ? `爬取完成，但出现错误: ${result.error}`
      : `爬取完成！发现 ${result.total_articles} 篇，新增 ${result.new_articles} 篇`;
    alert(msg);
  } catch (e) {
    alert('爬取请求失败: ' + e.message);
  } finally {
    crawlBusy = false;
    btn.textContent = '🔄 爬取最新';
    btn.disabled = false;
  }
}

document.getElementById('sourceFilter').addEventListener('change', (e) => {
  currentSource = e.target.value;
  loadArticles();
});

let searchTimeout;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    currentKeyword = e.target.value.trim();
    loadArticles();
  }, 400);
});

loadStats();
loadArticles();

let currentScript = '';
let generateBusy = false;

async function generateScript() {
  if (generateBusy) return;
  generateBusy = true;

  const modal = document.getElementById('scriptModal');
  const body = document.getElementById('scriptBody');
  const info = document.getElementById('scriptInfo');
  const dlBtn = document.getElementById('downloadBtn');
  const aiBtn = document.querySelector('.ai-btn');

  body.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在生成播报文字稿，请稍候...</div>';
  info.textContent = '';
  dlBtn.style.display = 'none';
  modal.classList.add('active');
  aiBtn.textContent = '⏳ 生成中...';
  aiBtn.disabled = true;

  try {
    const res = await fetch('/api/generate-script', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source: currentSource || undefined,
        category: currentCategory || undefined,
        keyword: currentKeyword || undefined,
        limit: 20,
      }),
    });
    const data = await res.json();

    if (data.error) {
      body.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${escapeHtml(data.error)}</div></div>`;
    } else {
      currentScript = data.script;
      body.innerHTML = `<pre>${escapeHtml(data.script)}</pre>`;
      info.textContent = `基于 ${data.article_count} 篇文章生成 | 模型: ${data.model} | 已保存: ${data.output_path}`;
      dlBtn.style.display = 'inline-block';
    }
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><div class="icon">❌</div><div>请求失败: ${escapeHtml(e.message)}</div></div>`;
  } finally {
    generateBusy = false;
    aiBtn.textContent = '🎙️ AI 播报稿';
    aiBtn.disabled = false;
  }
}

function closeScriptModal() {
  document.getElementById('scriptModal').classList.remove('active');
}

function downloadScript() {
  if (!currentScript) return;
  const blob = new Blob([currentScript], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0, 10);
  a.download = `broadcast_${date}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('scriptModal').addEventListener('click', function(e) {
  if (e.target === this) closeScriptModal();
});

let audioBusy = false;

async function generateAudio() {
  if (audioBusy) return;
  audioBusy = true;

  const modal = document.getElementById('audioModal');
  const body = document.getElementById('audioBody');
  const info = document.getElementById('audioInfo');
  const dlLink = document.getElementById('audioDownloadLink');
  const ttsBtn = document.getElementById('ttsBtn');

  body.innerHTML = '<div class="loading"><div class="spinner"></div>正在生成播报音频，请稍候...</div>';
  info.textContent = '';
  dlLink.style.display = 'none';
  modal.classList.add('active');
  ttsBtn.textContent = '⏳ 生成中...';
  ttsBtn.disabled = true;

  try {
    const payload = {};
    if (currentScript) {
      payload.script = currentScript;
    }

    const res = await fetch('/api/generate-audio', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();

    if (data.error) {
      body.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${escapeHtml(data.error)}</div></div>`;
    } else {
      const audioHtml = `
        <div style="text-align:center; padding: 20px 0;">
          <div style="font-size: 48px; margin-bottom: 16px;">🎵</div>
          <audio controls style="width: 100%; max-width: 500px;" autoplay>
            <source src="${data.audio_url}" type="audio/mpeg">
            您的浏览器不支持音频播放
          </audio>
        </div>
      `;
      body.innerHTML = audioHtml;
      info.textContent = `文本长度: ${data.text_length} 字 | 模型: ${data.model} | 已保存: ${data.output_path}`;
      dlLink.href = data.audio_url;
      dlLink.style.display = 'inline-block';
    }
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><div class="icon">❌</div><div>请求失败: ${escapeHtml(e.message)}</div></div>`;
  } finally {
    audioBusy = false;
    ttsBtn.textContent = '🔊 生成音频';
    ttsBtn.disabled = false;
  }
}

function closeAudioModal() {
  const modal = document.getElementById('audioModal');
  const audio = modal.querySelector('audio');
  if (audio) audio.pause();
  modal.classList.remove('active');
}

document.getElementById('audioModal').addEventListener('click', function(e) {
  if (e.target === this) closeAudioModal();
});

let singleBusy = false;

async function generateSingle() {
  if (singleBusy) return;
  singleBusy = true;

  const modal = document.getElementById('singleModal');
  const body = document.getElementById('singleBody');
  const info = document.getElementById('singleInfo');
  const dlLink = document.getElementById('singleDownloadLink');
  const btn = document.getElementById('singleBtn');

  body.innerHTML = '<div class="loading"><div class="spinner"></div>正在处理单篇新闻（生成播报稿 + 音频），请稍候...</div>';
  info.textContent = '';
  dlLink.style.display = 'none';
  modal.classList.add('active');
  btn.textContent = '⏳ 处理中...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/generate-single', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await res.json();

    if (data.error && !data.script) {
      body.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${escapeHtml(data.error)}</div></div>`;
    } else if (data.error && data.script) {
      body.innerHTML = `
        <div style="margin-bottom:16px;padding:10px 14px;background:#422006;border:1px solid #f59e0b;border-radius:8px;color:#fbbf24;font-size:13px;">
          ⚠️ 播报稿已生成，但音频生成失败：${escapeHtml(data.error)}
        </div>
        <h3 style="margin-bottom:8px;color:var(--text-secondary);font-size:13px;">📰 ${escapeHtml(data.title)}</h3>
        <pre style="white-space:pre-wrap;word-wrap:break-word;font-size:14px;line-height:1.8;">${escapeHtml(data.script)}</pre>
      `;
      info.textContent = `播报稿已保存: ${data.script_path}`;
    } else {
      body.innerHTML = `
        <div style="text-align:center; padding: 20px 0;">
          <div style="font-size: 48px; margin-bottom: 16px;">🎵</div>
          <h3 style="margin-bottom:8px;color:var(--text-secondary);font-size:13px;">📰 ${escapeHtml(data.title)}</h3>
          <audio controls style="width: 100%; max-width: 500px;" autoplay>
            <source src="${data.audio_url}" type="audio/mpeg">
            您的浏览器不支持音频播放
          </audio>
          <details style="text-align:left;margin-top:16px;">
            <summary style="cursor:pointer;color:var(--accent);font-size:13px;">查看播报稿全文</summary>
            <pre style="white-space:pre-wrap;word-wrap:break-word;font-size:14px;line-height:1.8;margin-top:8px;">${escapeHtml(data.script)}</pre>
          </details>
        </div>
      `;
      info.textContent = `文本: ${data.text_length} 字 | LLM: ${data.model} | TTS: ${data.tts_model}`;
      dlLink.href = data.audio_url;
      dlLink.style.display = 'inline-block';
    }
  } catch (e) {
    body.innerHTML = `<div class="empty-state"><div class="icon">❌</div><div>请求失败: ${escapeHtml(e.message)}</div></div>`;
  } finally {
    singleBusy = false;
    btn.textContent = '🧪 单篇测试';
    btn.disabled = false;
  }
}

function closeSingleModal() {
  const modal = document.getElementById('singleModal');
  const audio = modal.querySelector('audio');
  if (audio) audio.pause();
  modal.classList.remove('active');
}

document.getElementById('singleModal').addEventListener('click', function(e) {
  if (e.target === this) closeSingleModal();
});
</script>
</body>
</html>
